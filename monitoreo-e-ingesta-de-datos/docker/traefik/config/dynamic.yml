# traefik/config/dynamic.yml
http:
  middlewares:
    security-headers:
      headers:
        frameDeny: true
        sslRedirect: false  # CAMBIADO a false para entorno local
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"

    compress:
      compress:
        excludedContentTypes:
          - text/event-stream
